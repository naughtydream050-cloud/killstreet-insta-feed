name: Sync BASE Feed

on:
  schedule:
    - cron: '0 13 * * 0'   # 毎週日曜 22:00 JST
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'DRY_RUN (投稿しない確認実行)'
        required: false
        default: 'false'
      ig_max_posts:
        description: '最大投稿件数 (default: 1)'
        required: false
        default: '1'
      debug:
        description: 'DEBUG モード'
        required: false
        default: 'false'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - name: Run sync script
        run: python base_to_insta_feed.py
        env:
          BASE_CLIENT_ID:     ${{ secrets.BASE_CLIENT_ID }}
          BASE_CLIENT_SECRET: ${{ secrets.BASE_CLIENT_SECRET }}
          BASE_REFRESH_TOKEN: ${{ secrets.BASE_REFRESH_TOKEN }}
          BASE_ACCESS_TOKEN:  ${{ secrets.BASE_ACCESS_TOKEN }}
          INSTAGRAM_TOKEN:    ${{ secrets.INSTAGRAM_TOKEN }}
          IG_USER_ID:         ${{ secrets.IG_USER_ID }}
          SHOP_ID:            ${{ secrets.SHOP_ID }}
          GH_TOKEN:           ${{ secrets.GITHUB_TOKEN }}
          DRY_RUN:            ${{ github.event.inputs.dry_run || 'false' }}
          IG_MAX_POSTS:       ${{ github.event.inputs.ig_max_posts || '1' }}
          DEBUG:              ${{ github.event.inputs.debug || 'false' }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - id: deploy
        uses: actions/deploy-pages@v4
